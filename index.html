<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Luften Leads</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #15151a; --card: #1f1f26; --border: #2D2D36;
    --text: #EDEDF0; --text-sub: #9A98A8;
    --accent: #B5482E;
    --sev-low: #6FCF4A; --sev-mid: #E8B65C; --sev-high: #F08C3A; --sev-crit: #F06464;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-size: 14px;
  }
  .wrap { max-width: 1300px; margin: 0 auto; padding: 24px; }
  h1 { font-size: 20px; margin: 0 0 4px; }

  .sub { color: var(--text-sub); font-size: 13px; margin-bottom: 20px; }
  .controls {
    display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;
  }
  input, select {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 12px; font-size: 13px;
  }
  #search { flex: 1; min-width: 220px; }
  .stat { color: var(--text-sub); font-size: 13px; margin-bottom: 10px; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
  thead th {
    text-align: left; padding: 10px 12px; border-bottom: 1px solid var(--border);
    color: var(--text-sub); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--text); }
  tbody td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tbody tr.contacted { opacity: 0.45; }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  .sev { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
  .sev-1 { background: var(--sev-low); color: #10210a; }
  .sev-2 { background: var(--sev-mid); color: #2a1e08; }
  .sev-3 { background: var(--sev-high); color: #2a1404; }
  .sev-4 { background: var(--sev-crit); color: #2a0808; }
  .facility { font-weight: 600; }
  .meta { color: var(--text-sub); font-size: 12px; }
  button.contact-btn {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;
  }
  button.contact-btn.is-contacted { background: var(--accent); border-color: var(--accent); color: #fff; }
  #config-banner {
    background: #3D2F12; color: #E8B65C; padding: 10px 14px; border-radius: 8px;
    font-size: 13px; margin-bottom: 16px; display: none;
  }
  a.phone-link, a.maps-link { color: var(--text); text-decoration: none; }
  a.phone-link:hover, a.maps-link:hover { color: var(--accent); }

  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table { min-width: 900px; }

  #show-more-wrap { text-align: center; margin-top: 14px; }
  #show-more-btn {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 18px; font-size: 13px; cursor: pointer;
  }

  @media (max-width: 700px) {
    .wrap { padding: 14px; }
    .controls { flex-direction: column; }
    .controls input, .controls select { width: 100%; }
    button.contact-btn { padding: 8px 10px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Luften Leads</h1>
  <div class="sub">Nursing home facilities with CMS "unsafe/unclean environment" (F584) citations, ranked by severity and recency.</div>
  <div id="config-banner"></div>

  <div class="controls">
    <input id="search" type="text" placeholder="Search facility, city, or state...">
    <select id="state-filter"><option value="">All states</option></select>
    <select id="severity-filter">
      <option value="">All severities</option>
      <option value="4">Immediate jeopardy (J-L)</option>
      <option value="3">Actual harm (G-I)</option>
      <option value="2">Potential for more than minimal (D-F)</option>
      <option value="1">Minimal (A-C)</option>
    </select>
    <select id="contacted-filter">
      <option value="">All leads</option>
      <option value="hide">Hide contacted</option>
      <option value="only">Only contacted</option>
    </select>
  </div>

  <div class="stat" id="stat-line"></div>
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th data-sort="facility_name">Facility</th>
          <th data-sort="state">Location</th>
          <th data-sort="phone">Phone</th>
          <th data-sort="severity_rank">Severity</th>
          <th data-sort="survey_date">Citation date</th>
          <th data-sort="overall_rating">Rating</th>
          <th data-sort="chain_name">Chain</th>
          <th>Reports</th>
          <th>Contacted</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>
  <div id="show-more-wrap" style="display:none;">
    <button id="show-more-btn">Show more</button>
  </div>
</div>

<script>
// Paste your deployed Apps Script Web App URL here after setup (see README).
const API_URL = "https://script.google.com/a/macros/luften.net/s/AKfycbwYZDJywqrmhCYygOJ-zWot4vJx4E4XrWsU8ePYwxF1-4_EEk-fOdEbc2HSTyyvtF3J/exec";

let LEADS = [];
let CONTACTED = {};

let sortKey = "severity_rank";
let sortDir = -1;
let pageSize = 100;

const SEV_LABEL = { 1: "A-C", 2: "D-F", 3: "G-I", 4: "J-L" };

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

async function init() {
  if (!API_URL) {
    document.getElementById('config-banner').style.display = 'block';
    document.getElementById('config-banner').textContent =
      'No API_URL set — "Contacted" flags will not be saved or shared. Deploy the Apps Script (see README) and paste the Web App URL into index.html.';
  }

  const res = await fetch('output/leads.json');
  LEADS = await res.json();

  if (API_URL) {
    try {
      const cRes = await fetch(API_URL);
      const cData = await cRes.json();
      cData.forEach(row => { CONTACTED[row.lead_id] = row; });
    } catch (e) {
      console.error('Failed to load contacted status', e);
    }
  }

  const states = [...new Set(LEADS.map(l => l.state))].sort();
  document.getElementById('state-filter').innerHTML +=
    states.map(s => `<option value="${s}">${s}</option>`).join('');

  const resetAndRender = () => { pageSize = 100; render(); };
  document.getElementById('search').addEventListener('input', debounce(resetAndRender, 200));
  ['state-filter', 'severity-filter', 'contacted-filter'].forEach(id =>
    document.getElementById(id).addEventListener('input', resetAndRender)
  );
  document.querySelectorAll('thead th[data-sort]').forEach(th =>
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      sortDir = (sortKey === key) ? -sortDir : -1;
      sortKey = key;
      resetAndRender();
    })
  );
  document.getElementById('show-more-btn').addEventListener('click', () => {
    pageSize += 100;
    render();
  });

  render();
}

function render() {
  const term = document.getElementById('search').value.toLowerCase();
  const stateF = document.getElementById('state-filter').value;
  const sevF = document.getElementById('severity-filter').value;
  const contactF = document.getElementById('contacted-filter').value;

  let rows = LEADS.filter(l => {
    if (term && !`${l.facility_name} ${l.city} ${l.state}`.toLowerCase().includes(term)) return false;
    if (stateF && l.state !== stateF) return false;
    if (sevF && String(l.severity_rank) !== sevF) return false;
    const isContacted = !!(CONTACTED[l.lead_id] && CONTACTED[l.lead_id].contacted);
    if (contactF === 'hide' && isContacted) return false;
    if (contactF === 'only' && !isContacted) return false;
    return true;
  });

  rows.sort((a, b) => {
    const av = a[sortKey], bv = b[sortKey];
    if (av === bv) return 0;
    return (av > bv ? 1 : -1) * sortDir;
  });

  const total = rows.length;
  const visible = rows.slice(0, pageSize);

  document.getElementById('stat-line').textContent =
    `Showing ${visible.length} of ${total} matching leads (${LEADS.length} total)`;

  document.getElementById('rows').innerHTML = visible.map(l => {
    const isContacted = !!(CONTACTED[l.lead_id] && CONTACTED[l.lead_id].contacted);
    const mapsQuery = encodeURIComponent(`${l.address}, ${l.city}, ${l.state} ${l.zip_code}`);
    const phoneDigits = (l.phone || '').replace(/\D/g, '');
    return `
      <tr class="${isContacted ? 'contacted' : ''}">
        <td><div class="facility">${l.facility_name}</div><a class="maps-link meta" href="https://maps.google.com/?q=${mapsQuery}" target="_blank" rel="noopener">${l.address}</a></td>
        <td>${l.city}, ${l.state} ${l.zip_code}</td>
        <td>${phoneDigits ? `<a class="phone-link" href="tel:${phoneDigits}">${l.phone}</a>` : '—'}</td>
        <td><span class="sev sev-${l.severity_rank}">${SEV_LABEL[l.severity_rank] || '—'} (${l.scope_severity_code})</span>${l.citation_count > 1 ? ` <span class="meta">×${l.citation_count}</span>` : ''}${(l.matched_tags || '').split(',').length > 1 ? ' <span class="meta">F584+F690</span>' : ''}</td>
        <td>${l.survey_date}</td>
        <td>${l.overall_rating ? l.overall_rating + '★' : '—'}</td>
        <td class="meta">${l.chain_name || '—'}</td>
        <td>${l.propublica_search_url ? `<a class="maps-link meta" href="${l.propublica_search_url}" target="_blank" rel="noopener">Inspection reports</a>` : '—'}</td>
        <td><button class="contact-btn ${isContacted ? 'is-contacted' : ''}" data-id="${l.lead_id}">${isContacted ? 'Contacted ✓' : 'Mark contacted'}</button></td>
      </tr>`;
  }).join('');

  document.querySelectorAll('.contact-btn').forEach(btn =>
    btn.addEventListener('click', () => toggleContacted(btn.dataset.id))
  );
  document.getElementById('show-more-wrap').style.display = total > pageSize ? '' : 'none';
}

async function toggleContacted(leadId) {
  const wasContacted = !!(CONTACTED[leadId] && CONTACTED[leadId].contacted);
  const newState = !wasContacted;
  CONTACTED[leadId] = { lead_id: leadId, contacted: newState };
  render();

  if (!API_URL) return;
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ lead_id: leadId, contacted: newState })
    });
  } catch (e) {
    console.error('Failed to save contacted status', e);
  }
}

init();
</script>
</body>
</html>
